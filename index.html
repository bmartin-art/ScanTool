<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Duct Tracker — Brookstone</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f4f6f9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Duct Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- QR generation for pallet tags -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#eef2f7; --line:#d9dfe7; --inset:#eef2f7;
    --ink:#1a2230; --muted:#68727f; --amber:#E8930C;
    --good:#1f9d52; --bad:#dc3b3b; --warn:#E8930C; --info:#2f74d0;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --disp:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  /* dark mode = soft gray (not black); flips the palette via one class on body */
  body.dark{
    --bg:#2f333a; --panel:#3a3f47; --panel2:#454b54; --line:#535a64; --inset:#2b2f35;
    --ink:#e9ecf1; --muted:#a6aeb9;
  }
  body.dark .pill.fab{background:#24384f;color:#a9cdf2}
  body.dark .pill.pallet{background:#443a1c;color:#f0c775}
  body.dark .pill.loaded{background:#21402f;color:#8fdcac}
  body.dark .pill.short{background:#472626;color:#f2a6a6}
  body.dark .pill.stock{background:#3a2f47;color:#d3b3ee}
  body.dark .pill.s-received{background:#3a4150;color:#b9c3d2}
  body.dark .pill.s-programmed{background:#4a3f10;color:#f0d572}
  body.dark .pill.s-wip{background:#204030;color:#8fdcac}
  body.dark .pill.s-complete{background:#3a4150;color:#aab3c0}
  body.dark .feedback.good{background:#22402e;border-color:#2f7a4f}
  body.dark .feedback.bad{background:#472626;border-color:#8a3a3a}
  body.dark .feedback.warn{background:#453a1e;border-color:#8a6f22}
  body.dark .btn.danger{color:#f2b0b0;border-color:#7a3a3a;background:#3a2626}
  body.dark .btn.primary{color:#1a1400}
  html,body{margin:0;height:100%;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:var(--disp);
       -webkit-font-smoothing:antialiased;font-size:16px}
  button{font-family:var(--disp);cursor:pointer}
  .mono{font-family:var(--mono)}
  .muted{color:var(--muted)}
  .hidden{display:none!important}

  /* ---- shell ---- */
  header.bar{display:flex;align-items:center;gap:14px;padding:12px 18px;
    background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .logo{font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:15px;display:flex;align-items:center;gap:9px}
  .logomark{height:26px;width:26px;object-fit:contain;display:block}
  .logo b{color:var(--amber)}
  .bar .spacer{flex:1}
  .jobtag{font-family:var(--mono);font-size:13px;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:5px 10px}
  .jobtag b{color:var(--ink)}
  .live{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--good);display:inline-flex;align-items:center;gap:7px}
  .live.off{color:var(--muted)}
  .live i{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;animation:pulse 2s infinite}
  .live.off i{animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 90px}

  h1{font-size:26px;font-weight:800;letter-spacing:-.01em;margin:0 0 4px}
  h2{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
     color:var(--muted);margin:26px 0 12px}
  .sub{color:var(--muted);margin:0 0 22px;font-size:15px}

  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    border-radius:8px;padding:11px 16px;font-weight:600;font-size:15px}
  .btn:hover{border-color:#3d485b}
  .btn.primary{background:var(--amber);color:#1a1400;border-color:var(--amber)}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent}
  .btn.danger{color:#b23434;border-color:#e6b0b0;background:#fbe3e3}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* ---- home / job cards ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card.pri{border-color:var(--bad);box-shadow:0 0 0 1px var(--bad)}
  .card .name{font-weight:700;font-size:18px;margin-bottom:6px}
  .card .meta{font-size:13px;color:var(--muted);font-family:var(--mono)}
  .card .bar-wrap{margin-top:12px}
  .prog{height:8px;background:var(--inset);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .prog > i{display:block;height:100%;background:var(--good);width:0}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px;text-align:center;
    background:var(--panel);color:var(--muted)}
  .drop.hot{border-color:var(--amber);color:var(--ink)}
  .doneheader{margin-top:28px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;user-select:none}
  .doneheader:hover{color:var(--ink)}
  .doneheader .chev{display:inline-block;font-size:10px;transition:transform .15s}
  .doneheader .chev.open{transform:rotate(90deg)}

  input[type=text]{font-family:var(--disp);background:var(--inset);border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:11px 12px;font-size:15px}
  input[type=text]:focus{outline:none;border-color:var(--amber)}

  /* ---- scan view ---- */
  .modebar{display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:6px;margin-bottom:16px}
  .destbar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:16px}
  .destnow{font-size:15px}
  .destnow b{font-weight:800}
  .destplus{font-size:14px;padding:8px 12px}
  .destback{font-size:14px;padding:8px 12px;color:var(--amber);border-color:var(--amber)}
  .modebtn{flex:1;border:none;background:transparent;color:var(--muted);
    padding:12px;border-radius:7px;font-weight:700;font-size:15px;letter-spacing:.02em}
  .modebtn.active{background:var(--panel2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .modebtn.active.truck{color:var(--info);box-shadow:inset 0 0 0 1px #2b4b7a}
  .modebtn.active.pallet{color:var(--amber);box-shadow:inset 0 0 0 1px #5a4410}

  .scanwrap{position:relative}
  .scaninput{width:100%;font-family:var(--mono);font-size:20px;padding:16px 16px;
    background:var(--inset);border:1px solid var(--line);border-radius:10px;color:var(--ink);letter-spacing:.02em}
  .scaninput:focus{outline:none;border-color:var(--amber)}
  .focushint{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .focushint.on{color:var(--good)} .focushint.off{color:var(--bad)}

  /* storage location (per order) */
  .locrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:16px}
  .loclabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;white-space:nowrap}
  .locinput{flex:1;max-width:280px;font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:.04em;background:var(--inset);border:1px solid var(--line);border-radius:8px;color:var(--amber);padding:8px 12px}
  .locinput:focus{outline:none;border-color:var(--amber)}
  .locinput::placeholder{color:var(--muted);font-weight:500;font-size:14px;letter-spacing:0}

  /* manual entry (bad-label fallback) */
  .manual{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .manrow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .manfield{display:flex;flex-direction:column;gap:6px}
  .manfield label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .manfield input{font-family:var(--mono);font-size:20px;padding:12px;background:var(--inset);border:1px solid var(--line);border-radius:8px;color:var(--ink)}
  .manfield input:focus{outline:none;border-color:var(--amber)}
  .maninfo{margin-top:10px;font-size:14px;color:var(--muted)}
  .maninfo.good{color:#7ee0a2} .maninfo.bad{color:#f0a3a3}

  /* the signature: big scan feedback slab */
  .feedback{margin-top:14px;border-radius:14px;padding:22px 22px;min-height:132px;
    display:flex;flex-direction:column;justify-content:center;border:1px solid var(--line);
    background:var(--panel);transition:background .08s,border-color .08s}
  .feedback.good{background:#e2f6ea;border-color:#34a866}
  .feedback.bad{background:#fbe3e3;border-color:#d85656}
  .feedback.warn{background:#fcf1d6;border-color:#d9a520}
  .feedback .fbtop{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .feedback .fbmain{font-size:30px;font-weight:800;line-height:1.05;letter-spacing:-.01em}
  .feedback .fbcount{font-family:var(--mono);font-size:44px;font-weight:700;margin-top:8px}
  .feedback.good .fbcount{color:var(--good)}
  .feedback.warn .fbcount{color:var(--warn)}
  .feedback .fbsub{color:var(--muted);margin-top:6px;font-family:var(--mono);font-size:13px}

  /* progress + tables */
  .stat{display:flex;gap:22px;flex-wrap:wrap;margin:6px 0 20px}
  .stat .k{font-family:var(--mono);font-size:26px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  td.mono,th.num{font-family:var(--mono)}
  td.num,th.num{text-align:right}
  tr.done td{color:var(--muted)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;
    letter-spacing:.06em;text-transform:uppercase}
  .pill.fab{background:#e3edfb;color:#1e5aa8}
  .pill.pallet{background:#fbeecb;color:#8a5a00}
  .pill.loaded{background:#dcf3e6;color:#1f7a44}
  .pill.short{background:#fbe0e0;color:#b23434}
  .pill.stock{background:#f0e6fa;color:#7a44a8}
  .pill.s-received{background:#e7ebf1;color:#566276}
  .pill.s-programmed{background:#fbe7a0;color:#6b5300}
  .pill.s-wip{background:#d7f0e0;color:#1f7a44}
  .pill.s-complete{background:#e7ebf1;color:#68727f}

  /* stock tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .tile .d{font-weight:600;font-size:14px;margin-bottom:2px}
  .tile .n{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .counter{display:flex;align-items:center;gap:10px;margin-top:10px}
  .counter button{width:44px;height:44px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:22px;font-weight:700}
  .counter .v{font-family:var(--mono);font-size:22px;font-weight:700;min-width:64px;text-align:center}
  .counter .of{color:var(--muted);font-size:14px}

  /* pallets */
  .palletcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
  .palletcard.active{border-color:var(--amber)}
  .palletcard .ph{display:flex;align-items:center;gap:10px}
  .palletcard .pid{font-family:var(--mono);font-weight:700;font-size:16px}
  #tagModal,#slipModal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px;overflow:auto}
  .tag{background:#fff;color:#000;border-radius:8px;padding:24px;width:340px;text-align:center}
  .tag h3{margin:0 0 4px;font-size:22px;letter-spacing:.04em}
  .tag .job{font-family:var(--mono);font-size:13px;color:#444;margin-bottom:14px}
  .tag #qrbox{display:flex;justify-content:center;margin:0 auto 12px}
  .tag .manifest{text-align:left;font-size:13px;font-family:var(--mono);color:#111;
    border-top:1px dashed #bbb;padding-top:10px;margin-top:10px}
  .tag .manifest .mhdr{font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
  .tag .manifest .mrow{padding:2px 0;line-height:1.3}
  .tag .manifest .mcode{margin-top:10px;font-size:10px;color:#777;word-break:break-all}
  .slip{background:#fff;color:#111;border-radius:8px;padding:34px 38px;width:640px;max-width:100%;font-family:var(--disp)}
  .slip .sh{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #163158;padding-bottom:14px;margin-bottom:16px}
  .slip .brand{display:flex;align-items:center;gap:14px}
  .slip .slip-logo{width:58px;height:58px;flex:none}
  .slip .co{font-weight:800;font-size:22px;letter-spacing:.02em;color:#163158;line-height:1.05}
  .slip .co span{display:block;font-weight:600;font-size:11px;color:#5b6b82;letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
  .slip .doctype{text-align:right;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:#163158}
  .tag .tag-logo{width:46px;height:46px;margin:0 auto 6px;display:block}
  .slip .meta{display:flex;gap:36px;flex-wrap:wrap;margin-bottom:18px}
  .slip .meta .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#666}
  .slip .meta .v{font-weight:700;font-size:16px}
  .slip table{width:100%;border-collapse:collapse;font-size:14px}
  .slip th{border-bottom:1.5px solid #111;color:#111;text-transform:uppercase;font-size:11px;letter-spacing:.08em;text-align:left;padding:8px 6px}
  .slip td{border-bottom:1px solid #ddd;padding:9px 6px;color:#111}
  .slip td.num,.slip th.num{text-align:right}
  .slip .tot{margin-top:14px;text-align:right;font-weight:700;font-size:15px}
  .slip .empty{color:#666;padding:20px 0;text-align:center}
  @media print{ body:not(.csprint) *{visibility:hidden}
    body:not(.csprint) #tagModal,body:not(.csprint) #tagModal *,body:not(.csprint) #slipModal,body:not(.csprint) #slipModal *,body:not(.csprint) #delivModal,body:not(.csprint) #delivModal *{visibility:visible}
    body:not(.csprint) #tagModal,body:not(.csprint) #slipModal,body:not(.csprint) #delivModal{position:absolute;inset:0;background:#fff;display:block}
    .tag,.slip{box-shadow:none;margin:0 auto} .noprint{display:none} }

  footer.actions{position:fixed;bottom:0;left:0;right:0;background:var(--panel);
    border-top:1px solid var(--line);padding:10px 18px;display:flex;gap:10px;justify-content:center;z-index:20}
  .toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:8px;font-size:14px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  /* order entry form */
  .frow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .frow label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .frow input[type=text],.frow input[type=date],.frow select{background:var(--inset);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:11px 12px;font-size:15px;font-family:var(--disp)}
  .frow input:focus,.frow select:focus{outline:none;border-color:var(--amber)}

  /* schedule board */
  .schtop{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:16px}
  .schtitle{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .weeknav{display:flex;gap:6px}
  .floortoday{display:flex;align-items:center;gap:12px;margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 18px}
  .ftnum{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--amber);line-height:1}
  .ftnum span{font-size:15px;color:var(--muted);margin-left:4px}
  .ftlbl{font-size:13px;font-weight:700;line-height:1.25;text-transform:uppercase;letter-spacing:.06em}
  .ftlbl .muted{font-weight:600;letter-spacing:0;text-transform:none;font-size:12px}
  .schctrls{display:flex;gap:8px}
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}
  .daycol{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:220px}
  .daycol.today{border-color:var(--amber)}
  .unschedstrip{margin-top:14px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .unschedhdr{font-weight:800;font-size:15px;margin-bottom:10px}
  .unschedcards{display:flex;flex-wrap:wrap;gap:8px;min-height:40px}
  .unschedcards .schcard{width:210px}
  .unschedcards.draghot{outline:2px dashed var(--amber);outline-offset:3px;border-radius:8px}
  .dayhdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .dname{font-weight:800;font-size:15px}
  .ddate{color:var(--muted);font-weight:600;font-size:12px}
  .dcap{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .dcap.over{color:var(--bad);font-weight:700}
  .capbar{height:5px;background:var(--inset);border-radius:99px;overflow:hidden;border:1px solid var(--line);margin-bottom:10px}
  .capbar > i{display:block;height:100%}
  .daybody{display:flex;flex-direction:column;gap:8px;height:460px;overflow-y:auto;padding-right:4px}
  .daybody::-webkit-scrollbar{width:8px}
  .daybody::-webkit-scrollbar-thumb{background:#c2cad4;border-radius:99px}
  .daybody.draghot{outline:2px dashed var(--amber);outline-offset:3px;border-radius:8px}
  .dayempty{color:var(--line);text-align:center;padding:14px 0;font-size:13px}
  .schcard{background:var(--panel2);border:1px solid var(--line);border-left:4px solid #3a4658;border-radius:8px;padding:9px 10px;cursor:pointer}
  .schcard:hover{border-color:#3d485b}
  .schcard.st-received{border-left-color:#3a4658}
  .schcard.st-programmed{border-left-color:#e8c20a;background:rgba(232,194,10,.10)}
  .schcard.st-wip{border-left-color:var(--good);background:rgba(34,197,94,.13)}
  .schcard.st-complete{border-left-color:#3a4658;opacity:.45}
  .scrow{display:flex;justify-content:space-between;align-items:center;gap:6px}
  .scname{font-weight:700;font-size:14px;line-height:1.15}
  .scright{display:flex;align-items:center;gap:6px;flex:none}
  .scloc{font-family:var(--mono);font-weight:800;font-size:12px;line-height:1;color:var(--panel);background:var(--ink);border-radius:5px;padding:3px 6px;letter-spacing:.03em}
  .scpri{color:var(--bad);font-weight:800}
  .schbadge{font-size:11px;font-weight:700;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .scsplit{font-size:10px;font-weight:800;letter-spacing:.04em;background:var(--info);color:#fff;border-radius:5px;padding:2px 5px}
  .schcard.split{border-style:dashed}
  .schsplit{border-top:1px solid var(--line);padding-top:12px;margin-top:4px;width:100%}
  .schsplit .ssl{font-size:13px;color:var(--muted);margin-bottom:8px}
  .schsplit .ssrow{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:10px}

  /* ===== cover sheet (scoped under .cs, light theme, isolated from the app) ===== */
  .cs{--csink:#14253b;--cssteel:#3c4f63;--csmuted:#6b7886;--csline:#d3d9e0;--csline2:#e5e9ee;--csaccent:#e07b1a;--csfield:#fffdf6;
      background:#eceff3;color:var(--csink);border-radius:12px;padding:16px;margin-bottom:40px;font-size:14px;line-height:1.4}
  .cs .masthead{display:flex;align-items:center;gap:20px;background:#fff;border:1px solid var(--csline);border-radius:7px 7px 0 0;padding:14px 20px}
  .cs .masthead img{height:58px;width:auto}
  .cs .masthead .title{margin-left:auto;text-align:right}
  .cs .masthead .title h1{margin:0;font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--csink)}
  .cs .masthead .title p{margin:2px 0 0;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#b9610c;font-weight:700}
  .cs .matchbar{background:#163158;color:#fff;border-radius:6px;padding:9px 14px;margin-top:8px;font-size:13px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .cs .matchbar b{font-family:var(--mono);font-size:18px;color:#ffd27a;letter-spacing:.04em}
  .cs .matchbar span{font-size:11.5px;color:#c7d2e0;font-weight:500}
  .cs .hdr{background:#fff;border:1px solid var(--csline);border-top:none;border-radius:0 0 7px 7px;padding:14px 20px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:11px 18px}
  .cs .f{display:flex;flex-direction:column;gap:3px;min-width:0}
  .cs .f.wide{grid-column:span 2}
  .cs .f label{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--csmuted);font-weight:700}
  .cs .f input,.cs .f select,.cs .f textarea{font:inherit;font-size:13.5px;color:var(--csink);border:1px solid var(--csline);border-radius:5px;padding:7px 9px;background:var(--csfield);width:100%}
  .cs .f input[readonly]{background:#eef3f8;color:var(--cssteel);border-style:dashed}
  .cs input:focus,.cs select:focus,.cs textarea:focus{outline:2px solid var(--csaccent);border-color:var(--csaccent)}
  .cs .panels{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  .cs .col{display:flex;flex-direction:column;gap:14px}
  .cs .col-tag{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--cssteel);padding:0 2px 2px;border-bottom:2px solid var(--csline)}
  .cs .card{background:#fff;border:1px solid var(--csline);border-radius:7px;overflow:hidden}
  .cs .card>h3{margin:0;background:var(--csink);color:#fff;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;font-weight:700}

  .cs .row select,.cs .row input[type=text]{font:inherit;font-size:12.5px;border:1px solid var(--csline);border-radius:5px;padding:5px 7px;background:var(--csfield);max-width:100%}

  .cs .wide-card{margin-top:14px}
  .cs .notes textarea{width:100%;min-height:70px;resize:vertical;font:inherit;font-size:13px;border:1px solid var(--csline);border-radius:5px;padding:9px 11px;background:var(--csfield)}

  #delivModal.hidden{display:none}

  .dticket .dt-job{font-size:20px;font-weight:800;margin:16px 0 12px}
  .dticket .dt-row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid #d3d9e0}
  .dticket .dt-l{flex:0 0 150px;text-transform:uppercase;font-size:11px;letter-spacing:.08em;color:#6b7886;font-weight:700;align-self:center}

  @media print{
    @page{ size:letter; margin:14mm }

    body.csprint .cs .matchbar span{display:none}

    body.csprint .cs .panels{display:block;column-count:2;column-gap:8mm;margin-top:8px}
    body.csprint .cs .col{gap:6px}

    body.csprint .cs .card{margin-bottom:5px}
    body.csprint .cs .card>h3{font-size:9px;padding:3px 8px}
    body.csprint .cs .card .body{padding:2px 8px 4px}
    body.csprint .cs .row{min-height:0;padding:1.5px 0}
    body.csprint .cs .staging{gap:5px 12px}
    body.csprint .cs .wide-card,body.csprint .cs .notes{margin-top:6px}
    body.csprint .cs .card>h3,body.csprint .cs .masthead .title p{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

/* ---------- Store: Cloudflare Worker + D1, with a local cache/offline net.
   Reads are synchronous off an in-memory cache (so nothing else in the app
   changed). init() and openJob() pull fresh from the Worker; save() writes
   through to the Worker AND mirrors to localStorage, so a network blip never
   loses a scan — failed writes are retried on the next sync. ---------------- */
const Store = {
  key:'ducttracker.jobs.v1',
  _cache:{}, _dirty:new Set(),
  _localAll(){ try{return JSON.parse(localStorage.getItem(this.key))||{}}catch(e){return {}} },
  _localWrite(){ try{localStorage.setItem(this.key, JSON.stringify(this._cache));}catch(e){} },
  async _api(method, path, body){
    const c=Cfg.get();
    const res=await fetch(c.base.replace(/\/$/,'')+path,{
      method,
      headers:{'Content-Type':'application/json','X-Access-Token':c.token},
      body: body!==undefined?JSON.stringify(body):undefined });
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.json();
  },
  async init(){
    this._cache=this._localAll();                 // seed instantly / offline-safe
    try{
      const jobs=await this._api('GET','/jobs');
      this._cache={}; for(const j of jobs) this._cache[j.name]=j;
      this._localWrite();
      if(this._dirty.size) this._flush();
      return true;
    }catch(e){ toast('Offline — using local copy'); return false; }
  },
  async refresh(name){
    try{ const j=await this._api('GET','/jobs/'+encodeURIComponent(name));
      if(j){ this._cache[name]=j; this._localWrite(); } return j; }
    catch(e){ return this._cache[name]||null; }
  },
  async sync(){                                   // silent background refresh for live polling
    try{ const jobs=await this._api('GET','/jobs'); const c={};
      for(const j of jobs) c[j.name]=j; this._cache=c; this._localWrite(); return true; }
    catch(e){ return false; }
  },
  all(){ return {...this._cache}; },
  list(){ return Object.values(this._cache).map(normalizeOrder).sort((a,b)=>b.createdAt-a.createdAt); },
  get(name){ return normalizeOrder(this._cache[name]||null); },
  save(job){                                       // sync-looking; writes through async
    this._cache[job.name]=job; this._localWrite();
    this._api('PUT','/jobs/'+encodeURIComponent(job.name), job)
      .then(()=>this._dirty.delete(job.name))
      .catch(()=>{ this._dirty.add(job.name); toast('Not synced yet — will retry'); });
  },
  remove(name){
    delete this._cache[name]; this._localWrite();
    this._api('DELETE','/jobs/'+encodeURIComponent(name)).catch(()=>toast('Delete not synced'));
  },
  _flush(){ for(const n of [...this._dirty]){ const j=this._cache[n]; if(j) this.save(j); } },
};

/* ---------- tolerant CSV parser -----------------------------------------
   A quoted field only CLOSES on a quote that is followed by a comma or the
   end of the line. That lets CAMduct's inch-marks (e.g. 20") sit inside a
   quoted description without breaking the field. ------------------------- */
function parseCSV(text){
  const rows=[]; const lines=text.replace(/\r\n?/g,'\n').split('\n');
  for(const line of lines){
    if(line.trim()==='') continue;
    const fields=[]; let i=0;
    while(i<=line.length){
      let val='';
      if(line[i]==='"'){                      // quoted field
        i++;
        while(i<line.length){
          if(line[i]==='"' && (line[i+1]===',' || i+1>=line.length)){ i++; break; }
          val+=line[i++];
        }
      } else {                                // bare field
        while(i<line.length && line[i]!==',') val+=line[i++];
      }
      fields.push(val);
      if(line[i]===','){ i++; if(i>line.length) break; }
      else break;
    }
    rows.push(fields);
  }
  return rows;
}

function col(headers,names){
  for(const n of names){ const idx=headers.findIndex(h=>h.trim().toLowerCase()===n); if(idx>=0) return idx; }
  return -1;
}
// CAMduct "F time" is H:MM:SS per piece. Return hours (decimal).
function parseFtime(s){
  s=(s||'').trim(); if(!s) return 0;
  const p=s.split(':').map(n=>parseInt(n,10));
  if(p.some(isNaN)) return 0;
  let sec=0;
  if(p.length===3) sec=p[0]*3600+p[1]*60+p[2];
  else if(p.length===2) sec=p[0]*60+p[1];
  else sec=p[0];
  return sec/3600;
}
function buildJobFromCSV(text, jobName){
  const rows=parseCSV(text);
  if(!rows.length) throw new Error('Empty file.');
  const H=rows[0].map(h=>h.trim().toLowerCase());
  const iGroup=col(H,['epicor group','group']);
  const iFtime=col(H,['f time','ftime','fab time','time']);
  const iB64  =col(H,['item globally unique id (base64)','base64','item scan code (base64)']);
  const iGuid =col(H,['item globally unique id','guid']);
  const iQty  =col(H,['qty','quantity']);
  const iDesc =col(H,['description','desc']);
  const iItem =col(H,['item number','item no','itemnumber','item']);
  const iNotes=col(H,['notes','customer','customer name','ship to']);
  const iOrder=col(H,['order number','order no','order #','order']);
  if(iB64<0) throw new Error('No "Item Globally Unique ID (Base64)" column found — that is the scan key. Re-export with the Base64 column.');

  const items=[]; let excludedLabor=0, excludedZero=0, seq=0, customer='', orderNo='', fabHours=0, laborLineHours=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row.length||row.every(c=>c==='')) continue;
    const group=(row[iGroup]||'').trim();
    const desc =(row[iDesc]||'').trim();
    const qty  =parseInt((row[iQty]||'0').trim(),10)||0;
    const key  =(row[iB64]||'').trim();
    const feach=iFtime>=0 ? parseFtime(row[iFtime]) : 0;   // fab time for this line (hours)
    if(!customer && iNotes>=0 && (row[iNotes]||'').trim()) customer=(row[iNotes]||'').trim();
    if(!orderNo && iOrder>=0 && (row[iOrder]||'').trim()) orderNo=(row[iOrder]||'').trim();
    // CAMduct sometimes merges several distinct items onto one row — multiple GUIDs
    // (and item numbers) comma-separated, with ONE shared F time for the whole line.
    // Spread that time across the GUIDs to get a true per-piece time.
    const keys=key.split(',').map(s=>s.trim()).filter(Boolean);
    const nGuid=Math.max(1,keys.length);
    const feachPer=feach/nGuid;
    if(/labor/i.test(desc)){ excludedLabor++; if(qty>0) laborLineHours+=feachPer*qty; continue; }
    if(qty<=0){ excludedZero++; continue; }
    fabHours += feachPer*qty;                               // total = per-piece x quantity
    seq++;
    const itemNoRaw=(iItem>=0?(row[iItem]||'').trim():'')||String(seq);
    const type = group.toUpperCase()===STOCK_GROUP ? 'stock':'fab';
    const guid=(row[iGuid]||'').trim();
    const nums=itemNoRaw.split(',').map(s=>s.trim()).filter(Boolean);
    if(type==='stock' || keys.length<=1){
      items.push({ key, guid, itemNo:itemNoRaw, group,
        desc:desc||'(no description)', qty, type, wh:0, truck:0, fabEach:feachPer });
    } else {
      const per=Math.floor(qty/keys.length), extra=qty-per*keys.length;
      keys.forEach((k,idx)=>{
        const q=per+(idx<extra?1:0); if(q<=0) return;
        items.push({ key:k, guid:'', itemNo: nums[idx]||(itemNoRaw+'.'+(idx+1)),
          group, desc:desc||'(no description)', qty:q, type, wh:0, truck:0, fabEach:feachPer });
      });
    }
  }
  const fab=items.filter(i=>i.type==='fab'), stock=items.filter(i=>i.type==='stock');
  return {
    name: orderNo || jobName,          // storage key: order number is unique; job names can collide
    orderNo, customer, title:jobName,  // display fields
    company:'', email:'', otype:'', needBy:'', priority:false, status:'Received', scheduledDate:'', // front-office fields
    laborHours: iFtime>=0 ? Math.round(fabHours*100)/100 : undefined,   // total CAM fab time
    cover:{},                          // job-spec cover sheet data (filled in the app)
    createdAt:Date.now(),
    items, pallets:[], palletSeq:0,
    _summary:{ fabLines:fab.length, fabPieces:fab.reduce((s,i)=>s+i.qty,0),
               stockLines:stock.length, excludedLabor, excludedZero,
               fabHours:Math.round(fabHours*100)/100, laborLineHours:Math.round(laborLineHours*100)/100 }
  };
}
// Ensure older/records missing new fields get safe defaults when loaded.
function normalizeOrder(j){
  if(!j) return j;
  if(j.company===undefined) j.company='';
  if(j.email===undefined) j.email='';
  if(j.otype===undefined) j.otype='';
  if(j.needBy===undefined) j.needBy='';
  if(j.priority===undefined) j.priority=false;
  if(j.status===undefined) j.status='Received';
  if(j.scheduledDate===undefined) j.scheduledDate='';
  if(j.cover===undefined || j.cover===null) j.cover={};
  if(!Array.isArray(j.items)) j.items=[];
  if(!Array.isArray(j.pallets)) j.pallets=[];
  // warehouse = the required scan (drives completion); truck = optional 2nd step
  for(const it of j.items){
    if(it.wh===undefined) it.wh = (typeof it.onTruck==='number' ? it.onTruck : 0);  // old "onTruck" was the primary count
    if(it.truck===undefined) it.truck = 0;
  }
  return j;
}

/* ---------- per-item accounting helpers ---------------------------------- */
function palletQtyForKey(job,key,onlyUnloaded){
  let n=0; for(const p of job.pallets){ if(onlyUnloaded && p.loaded) continue;
    n+=(p.contents[key]||0); } return n; }
// WAREHOUSE = the required step (loose warehouse scans + anything on a pallet). Drives completion.
function whQty(job,it){ return (it.wh||0) + palletQtyForKey(job,it.key,false); }
// TRUCK = optional second step (loose truck scans + pallets loaded onto the truck).
function truckQty(job,it){ let n=(it.truck||0); for(const p of job.pallets){ if(p.loaded) n+=(p.contents[it.key]||0); } return n; }
function accounted(job,it){ return whQty(job,it); }          // for caps/remaining (can't warehouse more than qty)
function loadedQty(job,it){ return whQty(job,it); }          // "done" basis = warehoused
function remaining(job,it){ return it.qty - whQty(job,it); }
function truckRemaining(job,it){ return it.qty - truckQty(job,it); }
function itemStatus(job,it){
  if(whQty(job,it)>=it.qty) return 'loaded';                 // fully made & in warehouse
  if(palletQtyForKey(job,it.key,false)>0) return 'pallet';
  return 'fab';
}
function statusSlug(s){ return s==='Complete'?'complete':s==='Work In Progress'?'wip':s==='Programmed'?'programmed':'received'; }
function statusPill(s){ return `<span class="pill s-${statusSlug(s)}">${esc(s||'Received')}</span>`; }

/* ---------- scheduling / capacity ---------------------------------------- */
const DAILY_CAPACITY = 50;   // shop hours available per day
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; }
function weekDays(start){ const out=[]; for(let i=0;i<5;i++){ const d=new Date(start); d.setDate(start.getDate()+i); out.push(d); } return out; }
function loadedFrac(j){ const p=jobProgress(j); return p.total>0 ? p.load/p.total : (j.status==='Complete'?1:0); }
function orderHours(j){ return (typeof j.laborHours==='number') ? j.laborHours : 0; }
// A job can be visually split across days (j.splits = {date:hours}); it's still ONE order.
function hoursOnDay(j,ds){ if(j.splits && j.splits[ds]!=null) return j.splits[ds]; return (j.scheduledDate===ds)?orderHours(j):0; }
function schedAlloc(j){ if(j.splits){ const es=Object.entries(j.splits).filter(([d,h])=>h>0).sort((a,b)=>a[0]<b[0]?-1:1); if(es.length) return es.map(([date,hours])=>({date,hours})); } return j.scheduledDate?[{date:j.scheduledDate,hours:orderHours(j)}]:[]; }
function ordersOn(dateStr){ return Store.list().filter(j=> j.splits ? (j.splits[dateStr]>0) : (j.scheduledDate===dateStr)); }
function hoursScheduled(dateStr){ return ordersOn(dateStr).reduce((s,j)=>s+hoursOnDay(j,dateStr),0); }
function nextWeekday(ds){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(y,m-1,d); do{ dt.setDate(dt.getDate()+1); }while(dt.getDay()===0||dt.getDay()===6); return ymd(dt); }
function splitOrder(name, fromDay, n, toDay){
  const j=Store.get(name); if(!j) return;
  const tot=orderHours(j); if(tot<=0){ toast('No hours to split'); return; }
  const nd = toDay || nextWeekday(fromDay);
  if(nd===fromDay){ toast('Pick a different day'); return; }
  if(!j.splits){ j.splits={}; for(const a of schedAlloc(j)) j.splits[a.date]=a.hours; }
  if(!(j.splits[fromDay]>0)) j.splits[fromDay]=hoursOnDay(j,fromDay);
  n=Math.min(Math.max(1,Math.round(n)), j.splits[fromDay]);
  if(n>=j.splits[fromDay]){ toast('Leave some hours on the first day'); return; }
  j.splits[fromDay]-=n; if(j.splits[fromDay]<=0) delete j.splits[fromDay];
  j.splits[nd]=(j.splits[nd]||0)+n;
  const dates=Object.keys(j.splits).sort(); j.scheduledDate=dates[0]||j.scheduledDate;
  Store.save(j); render();
}
function hoursRemaining(dateStr){ return ordersOn(dateStr).reduce((s,j)=>s+orderHours(j)*(1-loadedFrac(j)),0); }
function fmtHr(h){ return (Math.round(h*10)/10).toString(); }

function isDone(j){ return j.items && j.items.length>0 && j.items.every(it=>loadedQty(j,it)>=it.qty); }
function bumpStatus(j){
  if(isDone(j)){ j.status='Complete'; return; }
  const anyLoaded=j.items.some(it=>loadedQty(j,it)>0);
  if(j.status==='Complete') j.status='Work In Progress';                       // dropped back below complete
  else if(anyLoaded && (j.status==='Received'||j.status==='Programmed'||!j.status)) j.status='Work In Progress';
}
function jobProgress(job){
  const fab=job.items.filter(i=>i.type==='fab');
  const total=fab.reduce((s,i)=>s+i.qty,0);
  const load=fab.reduce((s,i)=>s+loadedQty(job,i),0);
  return {total, load, pct: total? Math.round(load/total*100):0};
}

/* ---------- scan-string parsing ------------------------------------------
   Format from CAMduct QR:  <job name>/<22-char base64 code>
   Pallet tags we print:    <job name>/P:<palletId>
   Split on the LAST slash so job names may contain characters freely. ----- */
function parseScan(raw){
  const s=raw.trim(); const cut=s.lastIndexOf('/');
  if(cut<0) return {prefix:'',token:s};
  return {prefix:s.slice(0,cut), token:s.slice(cut+1)};
}

function newMatchCode(){
  const used=new Set(Store.list().filter(j=>j.status!=='Complete').map(j=>j.cover&&j.cover.matchCode).filter(Boolean));
  for(let i=0;i<9999;i++){ const code=String(Math.floor(1000+Math.random()*9000)); if(!used.has(code)) return code; }
  return String(Math.floor(1000+Math.random()*9000));
}

// "Selections only": hide every empty field so the printout is compact and fits
// one page — just the filled-in rows, cards, staging counts and header fields.
function csLeanForPrint(){
  const root=document.querySelector('.cs'); if(!root) return ()=>{};
  const hidden=[]; const hide=el=>{ if(el){ el.classList.add('cs-hide'); hidden.push(el); } };
  root.querySelectorAll('.row').forEach(row=>{
    const cb=row.querySelector('input[type=checkbox]');
    if(cb){ if(!cb.checked) hide(row); return; }
    const el=row.querySelector('select,input[type=text]');
    if(!el || !el.value.trim()) hide(row);
  });
  root.querySelectorAll('.hdr .f, .shoponly .f').forEach(f=>{
    const el=f.querySelector('input,select'); const v=el?el.value.trim():'';
    if(!v || v==='No') hide(f);
  });
  const notes=root.querySelector('.notes textarea'); if(notes && !notes.value.trim()) hide(notes.closest('.card'));
  root.querySelectorAll('.stg').forEach(s=>{ const i=s.querySelector('input'); if(!parseFloat(i&&i.value)) hide(s); });
  root.querySelectorAll('.card').forEach(card=>{
    const kids=card.querySelectorAll('.row, .stg, textarea');
    if(kids.length && ![...kids].some(k=>!k.classList.contains('cs-hide'))) hide(card);
  });
  root.querySelectorAll('.col').forEach(col=>{
    if(![...col.querySelectorAll('.card')].some(c=>!c.classList.contains('cs-hide'))) hide(col);
  });
  return ()=>hidden.forEach(el=>el.classList.remove('cs-hide'));
}

// Every cover-sheet field id (minus the cs_ prefix) that we persist into record.cover
const CS_FIELDS=['customer','acct','po','job','buyer','deldate','contact','email','phone','csr','shipto','freight','delivery','ordernum',
  'std','mat','labels','rpc','rnp','rec','recd','coilwidth','roec','notes','camfile','linerthk',
  'c_exposed','c_beaded','c_crossbreak','c_tagged','c_wrapped','c_bagged','c_angle','c_tierods','c_pocket','c_sealed','c_damper','c_soldered',
  'c_persmacna','c_pitt','c_standing','c_lap','c_kd','c_migr','c_prefabr','c_matfaced','c_doublewall',
  'c_spot','c_tack','c_stitch','c_migw','c_prefabro','c_ccl1','c_ccl15','c_sp1','c_sp2','c_mf12','c_fsk',
  's_standingS','s_slips','s_standingD','s_drives','s_tdc','s_ez','s_nuts','s_cleats','s_neoprene','s_butyl',
  'deliv_on','deliv_date','deliv_time','deliv_carrier','deliv_truck','deliv_name','deliv_phone','deliv_addr','deliv_notes'];

function saveCoverSheet(existing, isNew){
  const cov={};
  for(const f of CS_FIELDS){ const el=document.getElementById('cs_'+f); if(!el) continue; cov[f]=el.type==='checkbox'?el.checked:el.value.trim(); }
  const mc=document.getElementById('cs_matchcode'); cov.matchCode = (mc&&mc.value) || (existing&&existing.cover&&existing.cover.matchCode) || '';
  // remember new list entries for next time (customer->acct, ship-to/job->PO)
  let learned=0;
  if(cov.customer){ if(CustomLists.addCustomer(cov.customer, cov.acct)) learned++; }
  if(cov.job){ if(CustomLists.addJob(cov.job, cov.po)) learned++; }
  if(learned) toast('Saved to lists for next time');
  const ordernum=(cov.ordernum||'').trim();
  const sched=(document.getElementById('cs_sched').value||'');
  const priority=(document.getElementById('cs_pri').value==='Yes');
  const newStatus=document.getElementById('cs_status').value;
  const prevStatus=(existing&&existing.status)||'';
  // moving TO Complete will email the customer (once) — confirm first
  if(newStatus==='Complete' && prevStatus!=='Complete'){
    const em=(cov.email||(existing&&existing.email)||'').trim();
    const msg = em
      ? ('Mark this job Complete?\n\nThis emails the completion notice to '+em+((existing&&existing.emailSent)?' — but a notice was already sent, so it will NOT send again.':'.'))
      : 'Mark this job Complete?\n\n(No customer email is on file, so no notice will be sent.)';
    if(!confirm(msg)) return;
  }
  // start from the existing record, or a fresh temp-keyed one for a new sheet
  let rec = existing || { name:'TMP-'+Date.now(), orderNo:'', createdAt:Date.now(), items:[], pallets:[], palletSeq:0, status:'Received' };
  const oldName = rec.name;
  rec.cover = cov;
  // mirror identity onto the record so the email + schedule read it
  rec.customer = cov.customer || rec.customer || '';
  rec.contact  = cov.contact || '';
  rec.email    = cov.email || '';
  rec.phone    = cov.phone || '';
  rec.po       = cov.po || '';
  if(cov.job) rec.title = cov.job;
  rec.needBy   = cov.deldate || rec.needBy || '';
  rec.scheduledDate = sched || rec.scheduledDate || rec.needBy || '';
  rec.priority = priority;
  rec.status = newStatus || rec.status || 'Received';
  const sp=(cov.shipto||'').toUpperCase();
  rec.otype = sp.startsWith('P') ? 'Pickup' : (sp.startsWith('S') ? 'Delivery' : (rec.otype||''));
  // promote a temp record to the real order number once it's known
  if(ordernum){ rec.orderNo=ordernum; rec.name=ordernum; }
  normalizeOrder(rec);
  Store.save(rec);
  if(ordernum && oldName!==rec.name && /^TMP-/.test(oldName)) Store.remove(oldName);  // rename temp -> real
  editOrderName=null; openJob(rec.name);
  toast(isNew?'Order created':'Saved');
}

function openSchedule(){ if(!weekStart) weekStart=mondayOf(new Date()); go('schedule'); }

function renderSchedule(){
  if(!weekStart) weekStart=mondayOf(new Date());
  const week1=weekDays(weekStart);
  const nextStart=new Date(weekStart); nextStart.setDate(weekStart.getDate()+7);
  const week2=weekDays(nextStart);
  const todayStr=ymd(new Date());
  const remToday=hoursRemaining(todayStr), schedToday=hoursScheduled(todayStr);
  const unsched=Store.list().filter(j=>!j.scheduledDate && j.status!=='Complete').sort((a,b)=>schRank(a)-schRank(b));   // completed drop off
  const dayName=d=>d.toLocaleDateString('en-US',{weekday:'short'});
  const dayNum=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  const dayCol=(d)=>{
    const ds=ymd(d), used=hoursScheduled(ds), rem=hoursRemaining(ds);
    // completed jobs sink to the bottom; otherwise keep existing order
    const list=ordersOn(ds).slice().sort((a,b)=>schRank(a)-schRank(b));
    const pct=Math.min(100, Math.round(used/DAILY_CAPACITY*100));
    const over=used>DAILY_CAPACITY;
    const isToday=ds===todayStr;
    return `<div class="daycol ${isToday?'today':''}" data-day="${ds}">
      <div class="dayhdr">
        <div class="dname">${dayName(d)} <span class="ddate">${dayNum(d)}</span></div>
        <div class="dcap ${over?'over':''}">${fmtHr(used)}/${DAILY_CAPACITY} hr</div>
      </div>
      <div class="capbar"><i style="width:${pct}%;background:${over?'var(--bad)':'var(--amber)'}"></i></div>
      <div class="daybody" data-drop="${ds}">
        ${list.map(j=>schedCard(j,ds)).join('') || '<div class="dayempty">—</div>'}
      </div></div>`;
  };

  appEl.innerHTML=`
    <div class="schtop">
      <div class="schtitle">
        <h1 style="margin:0">Schedule</h1>
        <div class="weeknav">
          <button class="btn ghost" id="wkPrev">← Prev</button>
          <button class="btn ghost" id="wkThis">This week</button>
          <button class="btn ghost" id="wkNext">Next →</button>
        </div>
      </div>
      <div class="floortoday">
        <div class="ftnum">${fmtHr(remToday)}<span>hr</span></div>
        <div class="ftlbl">still on the floor today<br><span class="muted">${fmtHr(schedToday-remToday)} of ${fmtHr(schedToday)} hr done</span></div>
      </div>
      <div class="schctrls">
        <button class="btn ghost" id="schHome">← Orders</button>
        <button class="btn" id="tvToggle">${tvMode?'Exit TV':'TV view'}</button>
      </div>
    </div>
    <div class="board">${week1.map(dayCol).join('')}</div>
    ${tvMode ? '' : `
    <div class="board" style="margin-top:10px">${week2.map(dayCol).join('')}</div>
    <div class="unschedstrip">
      <div class="unschedhdr">Unscheduled <span class="muted">(${unsched.length})</span></div>
      <div class="unschedcards" data-drop="">${unsched.map(schedCard).join('') || '<div class="dayempty">nothing waiting</div>'}</div>
    </div>`}`;

  // week nav
  const shift=n=>{ weekStart=new Date(weekStart); weekStart.setDate(weekStart.getDate()+n*7); render(); };
  document.getElementById('wkPrev').onclick=()=>shift(-1);
  document.getElementById('wkNext').onclick=()=>shift(1);
  document.getElementById('wkThis').onclick=()=>{ weekStart=mondayOf(new Date()); render(); };
  document.getElementById('schHome').onclick=()=>{ goHome(); };
  document.getElementById('tvToggle').onclick=()=>{
    tvMode=!tvMode;
    if(tvMode && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    else if(!tvMode && document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    render();
  };
  // tap a card -> action popup (Start / Open / Split); works in normal AND TV view
  appEl.querySelectorAll('.schcard[data-open]').forEach(el=>el.onclick=()=>openSchedAction(el.dataset.open, el.dataset.sday||''));
  // drag to reschedule (desktop planning) — moving a card un-splits it to that day
  if(!tvMode){
    appEl.querySelectorAll('[data-open]').forEach(c=>{
      c.setAttribute('draggable','true');
      c.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/order', c.dataset.open); });
    });
    appEl.querySelectorAll('[data-drop]').forEach(z=>{
      z.addEventListener('dragover',e=>{ e.preventDefault(); z.classList.add('draghot'); });
      z.addEventListener('dragleave',()=>z.classList.remove('draghot'));
      z.addEventListener('drop',e=>{ e.preventDefault(); z.classList.remove('draghot');
        const name=e.dataTransfer.getData('text/order'); const j=Store.get(name);
        if(j){ j.scheduledDate=z.dataset.drop; j.splits=null; Store.save(j); render(); } });
    });
  }
  lastSchedSig=schedSig();
}
// Tap a schedule card -> quick actions (Start job, Open). Built as an overlay so
// it works the same on the shop TV as on a desktop.
function openSchedAction(name, sday){
  const j=Store.get(name); if(!j) return;
  const dayHrs = sday ? hoursOnDay(j,sday) : orderHours(j);
  const canSplit = sday && dayHrs>1;
  document.querySelectorAll('.schact-overlay').forEach(x=>x.remove());
  const wrap=document.createElement('div'); wrap.className='schact-overlay';
  wrap.innerHTML=`<div class="schact">
    <div class="schact-name">${esc(j.customer||j.title||j.name)}</div>
    <div class="schact-sub">${esc(j.title||'')} ${statusPill(j.status)}</div>
    <button class="btn primary lg" data-act="start">Start job — Work In Progress</button>
    <button class="btn lg" data-act="open">Open job</button>
    ${canSplit?`<div class="schsplit">
      <div class="ssl">Split job — ${fmtHr(dayHrs)} hr on this day</div>
      <div class="ssrow"><input type="number" id="splitHrs" min="1" max="${Math.floor(dayHrs)}" value="${Math.max(1,Math.round(dayHrs/2))}"><span>hrs to</span><input type="date" id="splitDay" value="${nextWeekday(sday)}"></div>
      <button class="btn lg" data-act="split">Split &amp; place</button>
    </div>`:''}
    ${j.splits?`<button class="btn ghost lg" data-act="unsplit">Un-split (one day)</button>`:''}
    <button class="btn ghost lg" data-act="cancel">Cancel</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  wrap.addEventListener('click',e=>{ if(e.target===wrap) close(); });
  wrap.querySelector('[data-act="cancel"]').onclick=close;
  wrap.querySelector('[data-act="open"]').onclick=()=>{ close(); openJob(name); };
  wrap.querySelector('[data-act="start"]').onclick=()=>{
    const job2=Store.get(name);
    if(job2){ job2.status='Work In Progress'; normalizeOrder(job2); Store.save(job2); }
    close(); render();
  };
  const sp=wrap.querySelector('[data-act="split"]');
  if(sp) sp.onclick=()=>{ const n=parseFloat(wrap.querySelector('#splitHrs').value)||0; const toDay=wrap.querySelector('#splitDay').value; close(); splitOrder(name, sday, n, toDay); };
  const us=wrap.querySelector('[data-act="unsplit"]');
  if(us) us.onclick=()=>{ const job2=Store.get(name); if(job2){ job2.splits=null; Store.save(job2); } close(); render(); };
}
function schedCard(j, ds){
  const p=jobProgress(j);
  const color = j.status==='Complete' ? 'var(--good)' : (p.pct>0?'var(--amber)':'var(--line)');
  const loc=(j.location||'').trim();
  const parts=schedAlloc(j).length;
  const hrs = ds ? hoursOnDay(j,ds) : orderHours(j);
  const split = parts>1;
  return `<div class="schcard st-${statusSlug(j.status)}${j.priority?' pri':''}${split?' split':''}" data-open="${esc(j.name)}" data-sday="${esc(ds||'')}">
    <div class="scrow"><span class="scname">${esc(j.customer||j.title||j.name)}</span><span class="scright">${split?'<span class="scsplit">SPLIT</span>':''}${j.priority?'<span class="scpri">!</span>':''}${loc?'<span class="scloc">'+esc(loc)+'</span>':''}</span></div>
    <div class="scmeta">${/^TMP-/.test(j.name)?'(no order # yet)':('#'+esc(j.orderNo||j.name))}${hrs?(' · '+fmtHr(hrs)+' hr'+(split?' of '+fmtHr(orderHours(j)):'')):''}</div>
    <div class="sctitle">${esc(j.title||'')}</div>
    <div class="scbar"><i style="width:${p.pct}%;background:${color}"></i></div>
  </div>`;
}
function schedSig(){ return Store.list().map(j=>j.name+':'+j.scheduledDate+':'+jobProgress(j).load+'/'+jobProgress(j).total+':'+j.status+':'+(j.laborHours||0)+':'+(j.location||'')+':'+(j.splits?JSON.stringify(j.splits):'')).join('|'); }

  appEl.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openJob(el.dataset.open));
  appEl.querySelectorAll('[data-export]').forEach(el=>el.onclick=ev=>{ev.stopPropagation();exportJob(el.dataset.export);});
  appEl.querySelectorAll('[data-edit]').forEach(el=>el.onclick=ev=>{ev.stopPropagation();openOrderForm(el.dataset.edit);});
  appEl.querySelectorAll('[data-del]').forEach(el=>el.onclick=ev=>{ev.stopPropagation();
    if(confirm('Remove order “'+el.dataset.del+'”? This deletes it for everyone. (The CAMduct export is unaffected.)')){Store.remove(el.dataset.del);render();}});
  const dt=document.getElementById('doneToggle'); if(dt) dt.onclick=()=>{ showCompleted=!showCompleted; render(); };
  const se=document.getElementById('jobSearch');
  if(se){
    se.oninput=()=>{ searchTerm=se.value; filterCards(); };
    se.addEventListener('keydown',e=>{ if(e.key!=='Enter') return;
      const v=se.value.trim(); if(!v) return;
      const all=Store.list();
      let hit=all.find(j=>String(j.orderNo)===v || j.name===v);       // exact order # (scanned barcode)
      if(!hit){ const m=all.filter(j=>((j.orderNo||'')+' '+(j.customer||'')+' '+(j.title||'')).toLowerCase().includes(v.toLowerCase())); if(m.length===1) hit=m[0]; }
      if(hit){ startOrder(hit.name); } else { toast('No order matches “'+v+'”'); }
    });
    if(!document.activeElement || document.activeElement===document.body) se.focus();  // ready to catch a paperwork scan
  }
  filterCards();
  lastHomeSig=homeSig();
}
function filterCards(){
  const term=(searchTerm||'').trim().toLowerCase();
  appEl.querySelectorAll('.card').forEach(c=>{
    const hay=c.getAttribute('data-search')||'';
    c.classList.toggle('hidden', term!=='' && !hay.includes(term));
  });
  const doneCards=document.getElementById('doneCards');
  if(doneCards) doneCards.classList.toggle('hidden', term!=='' ? false : !showCompleted);
}

// schedule sort: in-progress & programmed on top, received under them, completed at the bottom

function wireDrop(el){
  ['dragenter','dragover'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.add('hot');}));
  ['dragleave','drop'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.remove('hot');}));
  el.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(f) loadCSVFile(f); });
}

let pendingCSV=null, pendingName='';
function loadCSVFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ pendingCSV=reader.result;
    pendingName=file.name.replace(/\.csv$/i,'').replace(/_/g,' ').trim();
    go('ingest'); };
  reader.readAsText(file);
}
function loadJSONFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const j=JSON.parse(reader.result);
    if(!j.name||!j.items) throw new Error('Not a job file.');
    Store.save(j); toast('Opened “'+j.name+'”'); render();
  }catch(err){ alert('Could not open that file: '+err.message);} };
  reader.readAsText(file);
}

function stockTile(it){
  const wh=whQty(job,it), tr=truckQty(job,it);
  const cur = mode==='pallet' ? (activePallet?(activePallet.contents[it.key]||0):0) : (mode==='truck'?(it.truck||0):(it.wh||0));
  const destLabel = mode==='pallet'?'pallet':mode==='truck'?'truck':'warehouse';
  return `<div class="tile" data-stock="${esc(it.key)}">
    <div class="d">${esc(it.desc)}</div>
    <div class="n">item ${esc(it.itemNo)} · ${wh}/${it.qty} in warehouse${mode==='truck'?(' · '+tr+'/'+it.qty+' on truck'):''}</div>
    <div class="counter">
      <button data-step="-1">−</button>

      <button data-step="1">+</button>
      <span class="of">of ${it.qty} · to ${destLabel}</span>
    </div></div>`;

function wireStockTiles(){
  appEl.querySelectorAll('[data-stock]').forEach(tile=>{
    const key=tile.dataset.stock;
    tile.querySelectorAll('[data-step]').forEach(btn=>btn.onclick=()=>{
      const step=parseInt(btn.dataset.step,10);
      const it=job.items.find(i=>i.key===key);
      if(mode==='pallet'){
        if(!activePallet){ toast('Open a pallet first'); return; }
        if(step>0 && whQty(job,it)>=it.qty){ toast('Already fully in warehouse'); return; }
        const cur=activePallet.contents[key]||0, next=Math.max(0,cur+step);
        activePallet.contents[key]=next; if(next===0) delete activePallet.contents[key];
      } else if(mode==='truck'){
        if(step>0 && truckQty(job,it)>=it.qty){ toast('Already fully on truck'); return; }
        it.truck=Math.max(0,(it.truck||0)+step);
      } else {
        if(step>0 && whQty(job,it)>=it.qty){ toast('Already fully in warehouse'); return; }
        it.wh=Math.max(0,(it.wh||0)+step);
      }
      bumpStatus(job); Store.save(job); render();
    });
  });
  appEl.querySelectorAll('[data-activate]').forEach(b=>b.onclick=()=>{
    activePallet=job.pallets.find(p=>p.id===b.dataset.activate); render();
  });
}

    const it=job.items.find(i=>String(i.itemNo)===v && i.type==='fab');

    const pk=document.getElementById('pctK'); const pr=jobProgress(job); if(pk)pk.textContent=pr.pct+'%';
    if(mode==='pallet'){ const ps=document.getElementById('palletStrip'); if(ps) ps.innerHTML=palletStripHTML();
      appEl.querySelectorAll('[data-activate]').forEach(b=>b.onclick=()=>{activePallet=job.pallets.find(p=>p.id===b.dataset.activate);render();}); }
    item.focus();
  };
  qty.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('mAdd').click(); });
}

let lastScanToken='', lastScanAt=0;
const DUP_MS=1000;   // same code within this window = accidental double-read, not counted
function handleScan(raw){
  if(!raw.trim()) return;
  const {token}=parseScan(raw);
  const now=Date.now();
  if(token===lastScanToken && now-lastScanAt < DUP_MS){
    lastScanAt=now;   // keep the window open if the trigger is held / swept
    return feedback('warn','Same label — not counted','','just scanned','Scan the next piece. To re-scan the same one, wait a second.');
  }
  lastScanToken=token; lastScanAt=now;
  // pallet tag?
  if(/^P:/.test(token)){ return scanPalletTag(token.slice(2)); }
  // Every fabricated item carries a globally-unique code, so a label from another
  // order simply won't be found here — no name-based guard needed.
  const it=job.items.find(i=>i.key===token);
  if(!it){ return feedback('bad','Not this order',token,'That label isn’t part of this order'); }
  if(it.type==='stock'){ return feedback('warn','Stock item — use the count tiles',it.desc,'item '+it.itemNo); }
  // record the scan by destination
  if(mode==='truck'){
    if(truckQty(job,it)>=it.qty){ return feedback('warn','Already on truck',it.desc,'item '+it.itemNo+' · '+it.qty+' of '+it.qty); }
    it.truck=(it.truck||0)+1;
  } else if(mode==='pallet'){
    if(whQty(job,it)>=it.qty){ return feedback('warn','Already in warehouse',it.desc,'item '+it.itemNo+' · '+it.qty+' of '+it.qty); }
    if(!activePallet){ newPallet(); }
    activePallet.contents[it.key]=(activePallet.contents[it.key]||0)+1;
  } else { // warehouse (default)
    if(whQty(job,it)>=it.qty){ return feedback('warn','Already in warehouse',it.desc,'item '+it.itemNo+' · '+it.qty+' of '+it.qty); }
    it.wh=(it.wh||0)+1;
  }
  bumpStatus(job); Store.save(job);
  const acc = mode==='truck' ? truckQty(job,it) : whQty(job,it);
  const dest = mode==='pallet' ? (' → '+activePallet.id) : (mode==='truck' ? ' → truck' : ' → warehouse');
  feedback('good', it.desc, '', `${acc} of ${it.qty}`, 'item '+it.itemNo+dest);
  // refresh counts without stealing focus
  const p=jobProgress(job); const pk=document.getElementById('pctK'); if(pk) pk.textContent=p.pct+'%';
  if(mode==='pallet'){ const ps=document.getElementById('palletStrip'); if(ps) ps.innerHTML=palletStripHTML();
    appEl.querySelectorAll('[data-activate]').forEach(b=>b.onclick=()=>{activePallet=job.pallets.find(p=>p.id===b.dataset.activate);render();}); }
}

  wrap.innerHTML=`<div class="schact">

    <button class="btn primary lg" data-d="pallet">Scan to pallet</button>
    <button class="btn lg" data-d="truck">Scan to truck (optional load-out)</button>
    <button class="btn ghost lg" data-d="cancel">Cancel</button>
  </div>`;
  document.body.appendChild(wrap);

function scanPalletTag(id){
  const p=job.pallets.find(x=>x.id===id);
  if(!p){ return feedback('bad','Unknown pallet tag',id,'Not found in this job'); }
  if(mode!=='truck'){ return feedback('warn','Switch to Truck to load a pallet','use + → Scan to truck',id); }
  if(p.loaded){ return feedback('warn','Pallet already loaded',id,''); }
  p.loaded=true; bumpStatus(job); Store.save(job);
  const n=Object.values(p.contents).reduce((a,b)=>a+b,0);
  feedback('good','Pallet loaded onto truck',id,'',n+' item(s)');
  const pk=document.getElementById('pctK'); const pr=jobProgress(job); if(pk)pk.textContent=pr.pct+'%';
}

function feedback(kind,main,mid,count,sub){
  const fb=document.getElementById('fb'); if(!fb) return;
  fb.className='feedback '+kind;
  fb.innerHTML=`<div class="fbtop">${kind==='good'?'Scanned':kind==='warn'?'Heads up':'Error'}</div>
    <div class="fbmain">${esc(main)}${mid?' · '+esc(mid):''}</div>
    ${count?`<div class="fbcount">${esc(count)}</div>`:''}
    ${sub?`<div class="fbsub">${esc(sub)}</div>`:''}`;
  beep(kind);
}

/* ---------- pallets ------------------------------------------------------- */
function newPallet(){
  job.palletSeq=(job.palletSeq||0)+1;
  const id='PLT-'+job.palletSeq;
  const p={id, contents:{}, loaded:false, createdAt:Date.now()};
  job.pallets.push(p); activePallet=p; Store.save(job);
  toast('Started '+id);
}
function printTag(p){
  if(!p){ toast('No open pallet'); return; }
  const code=job.name+'/P:'+p.id;
  document.getElementById('tagLogo').src=LOGO_URI;
  document.getElementById('tagId').textContent=p.id;
  document.getElementById('tagJob').textContent=job.name;
  const box=document.getElementById('qrbox'); box.innerHTML='';
  new QRCode(box,{text:code,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
  const lines=Object.entries(p.contents).filter(([k,q])=>q>0).map(([k,q])=>{
    const it=job.items.find(i=>i.key===k); return {q, no: it?it.itemNo:'?', desc: it?it.desc:k}; });
  const total=lines.reduce((s,l)=>s+l.q,0);
  document.getElementById('tagManifest').innerHTML=
    `<div class="mhdr">Contents — ${total} piece${total===1?'':'s'}</div>`+
    (lines.length ? lines.map(l=>`<div class="mrow"><b>${l.q}×</b> #${esc(String(l.no))} — ${esc(l.desc)}</div>`).join('') : '<div>(empty)</div>')+
    `<div class="mcode">${esc(code)}</div>`;
  document.getElementById('tagModal').classList.remove('hidden');
}
function closeTag(){ document.getElementById('tagModal').classList.add('hidden'); refocus(); }

function printSlip(){
  const delivered=job.items.filter(it=>loadedQty(job,it)>0)
    .map(it=>({no:it.itemNo, desc:it.desc, qty:loadedQty(job,it)}))
    .sort((a,b)=>(parseInt(a.no,10)||0)-(parseInt(b.no,10)||0));
  const totalPieces=delivered.reduce((s,d)=>s+d.qty,0);
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  const rows=delivered.length
    ? delivered.map(d=>`<tr><td class="num">${esc(d.no)}</td><td>${esc(d.desc)}</td><td class="num">${d.qty}</td></tr>`).join('')
    : `<tr><td colspan="3" class="empty">Nothing loaded yet — scan items onto a truck first.</td></tr>`;
  document.getElementById('slipDoc').innerHTML=`
    <div class="sh">
      <div class="brand"><img class="slip-logo" src="${LOGO_URI}" alt="Brookstone">
        <div class="co">Brookstone Industries<span>Sheet Metal &amp; HVAC Fabrication</span></div></div>
      <div class="doctype">Packing Slip</div>
    </div>
    <div class="meta">
      ${job.customer?`<div><div class="l">Customer</div><div class="v">${esc(job.customer)}</div></div>`:''}
      ${job.orderNo?`<div><div class="l">Order #</div><div class="v">${esc(job.orderNo)}</div></div>`:''}
      ${job.title&&job.title!==job.name?`<div><div class="l">Job</div><div class="v">${esc(job.title)}</div></div>`:''}
      <div><div class="l">Date</div><div class="v">${date}</div></div>
    </div>
    <table><thead><tr><th class="num">Item</th><th>Description</th><th class="num">Qty</th></tr></thead>
      <tbody>${rows}</tbody></table>
    ${delivered.length?`<div class="tot">${delivered.length} line(s) · ${totalPieces} piece(s) delivered</div>`:''}`;
  document.getElementById('slipModal').classList.remove('hidden');
}
function closeSlip(){ document.getElementById('slipModal').classList.add('hidden'); refocus(); }

/* ---------- REPORT / shortages ------------------------------------------- */
function renderReport(){
  const fab=job.items.filter(i=>i.type==='fab');
  const stock=job.items.filter(i=>i.type==='stock');
  const short=job.items.filter(i=>remaining(job,i)>0);
  const rowFor=it=>{
    const load=loadedQty(job,it), acc=accounted(job,it), rem=it.qty-acc, st=itemStatus(job,it);
    const pill= st==='loaded'?'<span class="pill loaded">loaded</span>'
              : rem>0 && st!=='pallet' ?'<span class="pill short">short '+rem+'</span>'
              : st==='pallet'?'<span class="pill pallet">on pallet</span>'
              : '<span class="pill fab">fabricated</span>';
    return `<tr class="${rem<=0?'done':''}">
      <td class="mono">${esc(it.itemNo)}</td><td>${esc(it.desc)}</td>
      <td class="num mono">${it.qty}</td><td class="num mono">${load}</td>
      <td class="num mono">${rem>0?rem:0}</td><td>${pill}</td></tr>`;
  };
  appEl.innerHTML=`
    <h1>${esc(job.customer||job.title||job.name)} — status ${statusPill(job.status)}</h1>
    ${job.emailSent?`<p class="sub" style="color:var(--good)">Customer notified${job.emailedAt?' · '+new Date(job.emailedAt).toLocaleString():''}</p>`:''}
    <p class="sub">${job.orderNo?'Order #<b>'+esc(job.orderNo)+'</b> · ':''}${job.location?'Location <b>'+esc(job.location)+'</b> · ':''}${job.title&&job.title!==job.name?esc(job.title)+' · ':''}Short pieces list the item number so you can look up the size on the shop sheet.</p>

    <h2>Short / not yet loaded (${short.length})</h2>
    ${short.length?`<table><thead><tr><th>Item</th><th>Description</th><th class="num">Qty</th><th class="num">Loaded</th><th class="num">Short</th><th>Status</th></tr></thead>
      <tbody>${short.map(rowFor).join('')}</tbody></table>`
     :`<div class="drop">Nothing short — every piece is accounted for. </div>`}

    <h2>Pallets (${job.pallets.length})</h2>
    ${job.pallets.length?job.pallets.map(p=>{
      const n=Object.values(p.contents).reduce((a,b)=>a+b,0);
      const lines=Object.entries(p.contents).map(([k,q])=>{const it=job.items.find(i=>i.key===k);return `${q}× ${it?it.desc:k}`;});
      return `<div class="palletcard"><div class="ph"><span class="pid">${esc(p.id)}</span>
        ${p.loaded?'<span class="pill loaded">loaded</span>':'<span class="pill pallet">open</span>'}
        <span class="pill">${n} item(s)</span></div>
        <div class="n mono" style="color:var(--muted);margin-top:8px;font-size:12px">${lines.map(esc).join(' · ')||'empty'}</div></div>`;
    }).join(''):'<p class="muted">No pallets built.</p>'}

    <h2>All fabricated items (${fab.length})</h2>
    <table><thead><tr><th>Item</th><th>Description</th><th class="num">Qty</th><th class="num">Loaded</th><th class="num">Short</th><th>Status</th></tr></thead>
      <tbody>${fab.map(rowFor).join('')}</tbody></table>

    ${stock.length?`<h2>Stock (${stock.length})</h2>
    <table><thead><tr><th>Item</th><th>Description</th><th class="num">Qty</th><th class="num">Counted</th></tr></thead>
      <tbody>${stock.map(it=>`<tr><td class="mono">${esc(it.itemNo)}</td><td>${esc(it.desc)}</td>
        <td class="num mono">${it.qty}</td><td class="num mono">${accounted(job,it)}</td></tr>`).join('')}</tbody></table>`:''}
  `;
  footerEl.classList.remove('hidden');
  footerEl.innerHTML=`<button class="btn primary" id="slip">Packing slip</button>
    <button class="btn" id="back">Back to scanning</button>
    <button class="btn ghost" id="exp">Export job file</button>`;
  document.getElementById('slip').onclick=()=>printSlip();
  document.getElementById('back').onclick=()=>goBack();
  document.getElementById('exp').onclick=()=>exportJob(job.name);
  lastReportSig=jobSig(job);
}

/* ---------- export -------------------------------------------------------- */
function exportJob(name){
  const j=Store.get(name); if(!j) return;
  const blob=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name.replace(/[^\w.-]+/g,'_')+'.json'; a.click();
  toast('Exported '+a.download);
}

/* ---------- focus keeping + feedback beep + helpers ---------------------- */
let focusTimer=null, locSaveTimer=null;
function keepFocus(inp){
  inp.focus();
  const hint=document.getElementById('focushint');
  const set=on=>{ if(!hint) return; hint.textContent=on?'Ready':'Tap to resume'; hint.className='focushint '+(on?'on':'off'); };
  inp.addEventListener('blur',()=>{ set(false);
    clearTimeout(focusTimer); focusTimer=setTimeout(()=>{
      const ae=document.activeElement;
      const elsewhere = ae && ae!==inp && ['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
      if(view==='scan' && !manualOpen && !elsewhere && document.getElementById('tagModal').classList.contains('hidden')) inp.focus();
    },120); });
  inp.addEventListener('focus',()=>set(true));
  document.addEventListener('click',e=>{ if(view!=='scan'||manualOpen) return;
    if(!e.target.closest('button') && !e.target.closest('input') && document.getElementById('tagModal').classList.contains('hidden')) inp.focus(); });
}
function refocus(){ const i=document.getElementById('scan'); if(i) i.focus(); }

// Page-wide scan capture: the Bluetooth scanner "types" its code + Enter. We read
// it here so no editable field needs focus (which is what popped the soft keyboard).
let scanBuf='', scanBufT=0;
document.addEventListener('keydown', e=>{
  if(view!=='scan' || manualOpen) return;
  const ae=document.activeElement;
  if(ae && ae.id!=='scan' && ['INPUT','TEXTAREA','SELECT'].includes(ae.tagName)) return; // let location/manual fields type
  if(e.key==='Enter'){ if(scanBuf){ e.preventDefault(); const v=scanBuf; scanBuf=''; const s=document.getElementById('scan'); if(s) s.value=''; handleScan(v); } return; }
  if(e.key && e.key.length===1){
    const now=Date.now(); if(now-scanBufT>600) scanBuf='';   // long gap = fresh scan
    scanBufT=now; scanBuf+=e.key;
    const s=document.getElementById('scan'); if(s) s.value=scanBuf;
  }
});

let actx=null;
function beep(kind){
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const o=actx.createOscillator(), g=actx.createGain(); o.connect(g); g.connect(actx.destination);
    o.type='square';                                   // square = louder, sharper (scanner-style)
    const now=actx.currentTime;
    let f=1000, vol=0.9, dur=0.12;
    if(kind==='warn'){ f=560; vol=0.95; dur=0.18; }
    else if(kind!=='good'){ f=200; vol=1.0; dur=0.34; }   // 'bad'
    o.frequency.value=f;
    g.gain.setValueAtTime(vol, now);
    o.start(now); o.stop(now+dur);
    g.gain.exponentialRampToValueAtTime(.0001, now+dur+.03);
  }catch(e){}
}
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function boot(){
  if(!Cfg.ready()){ view='settings'; render(); return; }
  await Store.init();
  view='home'; render();
  startPolling();
}

/* ---------- live polling: refresh the shared views in near real time ------ */
function startPolling(){
  stopPolling();
  const dot=document.getElementById('liveDot'); if(dot) dot.classList.remove('hidden');
  pollTimer=setInterval(liveTick, 5000);
  document.addEventListener('visibilitychange', onVis);
}
function stopPolling(){ if(pollTimer) clearInterval(pollTimer); pollTimer=null; }
function onVis(){ if(!document.hidden) liveTick(); }
async function liveTick(){
  if(polling || document.hidden) return;
  polling=true; const ok=await Store.sync(); polling=false;
  const dot=document.getElementById('liveDot'); if(dot) dot.className='live'+(ok?'':' off');
  if(!ok) return;
  // Only the shared, read-only views auto-redraw — never the active scan screen.
  if(view==='home'){
    const se=document.getElementById('jobSearch');
    if(se && document.activeElement===se) return;   // don't disrupt active typing
    const sig=homeSig(); if(sig!==lastHomeSig){ lastHomeSig=sig; renderHome(); } }
  else if(view==='report' && job){ const j=Store.get(job.name);
    if(j){ const sig=jobSig(j); if(sig!==lastReportSig){ lastReportSig=sig; job=j; renderReport(); } } }
  else if(view==='schedule'){ const sig=schedSig(); if(sig!==lastSchedSig){ lastSchedSig=sig; renderSchedule(); } }
  else if(view==='delivery'){ const sig=delivSig(); if(sig!==lastDelivSig){ lastDelivSig=sig; renderDelivery(); } }
  else if(view==='scan' && job){ // update just the completion number in place, no redraw
    const j=Store.get(job.name); const pk=document.getElementById('pctK');
    if(j && pk && j!==job){ /* another device changed it; leave the scanner's own view intact */ } }
}
function homeSig(){ return Store.list().map(j=>{const p=jobProgress(j);
  return j.name+'|'+p.load+'/'+p.total+'|'+j.pallets.length+'|'+(j.location||'')+'|'+j.status+'|'+(j.scheduledDate||'');}).join('¦'); }
function jobSig(j){ return j.items.map(i=>i.key+'='+loadedQty(j,i)).join(',')
  +'#'+j.pallets.map(p=>p.id+(p.loaded?'L':'')+':'+Object.values(p.contents).join('.')).join(','); }
boot();

/* PWA: register the service worker (installable, fullscreen, resilient on shop wifi). */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
